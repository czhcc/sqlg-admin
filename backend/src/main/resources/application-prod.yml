spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:sqlgmngdb}
    username: ${DB_USER:sqlg_mng}
    password: ${DB_PASSWORD:sqlg_mng}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# 覆盖 sqlg.properties 中的 jdbc 连接, 使 sqlg 图数据源与主数据源指向同一实例
sqlg:
  jdbc:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:sqlgmngdb}
    username: ${DB_USER:sqlg_mng}
    password: ${DB_PASSWORD:sqlg_mng}
