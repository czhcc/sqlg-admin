server:
  port: 8090
  servlet:
    context-path: /api

spring:
  application:
    name: graph-mng-backend
  datasource:
    url: jdbc:postgresql://192.168.31.112:5432/sqlgmngdb
    username: sqlg_mng
    password: sqlg_mng
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.trs.user.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-statement-timeout: 30

sqlg:
  enabled: true
  properties-file: sqlg.properties

app:
  jwt:
    secret: "Z3JhcGgtbW5nLXBsYXRmb3JtLWp3dC1zZWNyZXQta2V5LWZvci1oczI1Ni1iYXNlNjQtc2lnbmluZy0yMDI2"
    expiration-ms: 86400000   # 24h
    header: Authorization
    prefix: "Bearer "

sqlg-admin:
  gremlin:
    max-result-size: 1000
    timeout-seconds: 30
    readonly-mode: false
    blocked-keywords:
      - io
      - system
  graph-expand:
    max-depth: 3
    max-nodes: 500
    max-edges: 1000
  import:
    batch-size: 1000

logging:
  level:
    com.trs: DEBUG
    org.mybatis: WARN
    org.umlg.sqlg: INFO
    org.flywaydb: DEBUG
